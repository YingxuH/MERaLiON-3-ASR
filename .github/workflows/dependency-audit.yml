name: Dependency Audit (pip-audit)

on:
  push:
    branches: [main, release/0.2.x]
  pull_request:
    branches: [main, release/0.2.x]
  schedule:
    - cron: "0 4 * * 1" # weekly

jobs:
  pip-audit:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pip-audit
      - name: Run pip-audit
        # pip-audit fails on ANY known advisory across the FULL installed
        # dependency tree. Every current finding is in a large upstream ML
        # dependency (vllm / torch / transformers and their transitive deps
        # xgrammar, diskcache) — none are in this package's own code. They are
        # suppressed below with rationale:
        #   * vllm is hard-pinned to 0.16.0 (the version the bundled V1 plugin is
        #     validated against). The server-side vllm advisories require an
        #     externally-reachable `vllm serve`; this package always binds the
        #     internal vLLM to localhost behind its own sidecar, so they are not
        #     reachable in the supported deployment.
        #   * the torch / transformers / diskcache advisories have no fixed
        #     release, or a fix only in an incompatible major prerelease
        #     (transformers 5.0.0rc3).
        # Any NEW advisory not listed here will still fail this job.
        # Last reviewed: 2026-06-07.
        run: |
          pip-audit \
            --ignore-vuln CVE-2025-69872 \
            --ignore-vuln PYSEC-2026-139 \
            --ignore-vuln PYSEC-2025-217 \
            --ignore-vuln CVE-2026-1839 \
            --ignore-vuln PYSEC-2026-144 \
            --ignore-vuln CVE-2026-34753 \
            --ignore-vuln CVE-2026-34756 \
            --ignore-vuln CVE-2026-25960 \
            --ignore-vuln CVE-2026-27893 \
            --ignore-vuln CVE-2026-44222 \
            --ignore-vuln CVE-2026-7141 \
            --ignore-vuln CVE-2026-25048
